skill_dag_version: "1.0"
name: "arc-human-skills"
description: "Human-like reading, writing, painting skills for ARC-AGI-3"

# Skill registry - atomic skills following CogniArc v2 architecture
skills:

  # ============ FUNDAMENTAL STROKES (Writing Foundation) ============
  - id: "stroke_vertical_down"
    name: "Vertical Down Stroke"
    domain: "writing"
    category: "fundamental"
    description: "Straight line top to bottom - basis for I, L, T, H, etc."
    prerequisites: []
    strokes: [[0, 0, 0, -50]]
    difficulty: 1
    practice_reps: 10

  - id: "stroke_horizontal_right"
    name: "Horizontal Right Stroke"
    domain: "writing"
    category: "fundamental"
    description: "Left to right line - basis for E, F, T, Z, etc."
    prerequisites: []
    strokes: [[0, 0, 50, 0]]
    difficulty: 1
    practice_reps: 10

  - id: "stroke_diagonal_down_right"
    name: "Diagonal Down-Right Stroke"
    domain: "writing"
    category: "fundamental"
    description: "Top-left to bottom-right - basis for A, K, X, Y, etc."
    prerequisites: ["stroke_vertical_down", "stroke_horizontal_right"]
    strokes: [[0, 0, 50, -50]]
    difficulty: 2
    practice_reps: 10

  - id: "stroke_diagonal_down_left"
    name: "Diagonal Down-Left Stroke"
    domain: "writing"
    category: "fundamental"
    description: "Top-right to bottom-left - basis for A, V, W, X, Y, etc."
    prerequisites: ["stroke_vertical_down", "stroke_horizontal_right"]
    strokes: [[50, 0, 0, -50]]
    difficulty: 2
    practice_reps: 10

  - id: "stroke_curve_cw"
    name: "Clockwise Curve"
    domain: "writing"
    category: "fundamental"
    description: "Clockwise arc - basis for B, C, D, G, J, O, P, Q, R, S, etc."
    prerequisites: []
    strokes: [[25,0,50,-15], [50,-15,35,-35], [35,-35,0,-50]]
    difficulty: 2
    practice_reps: 10

  - id: "stroke_curve_ccw"
    name: "Counter-Clockwise Curve"
    domain: "writing"
    category: "fundamental"
    description: "Counter-clockwise arc - basis for C, G, O, Q, S, etc."
    prerequisites: []
    strokes: [[25,0,0,-15], [0,-15,15,-35], [15,-35,50,-50]]
    difficulty: 2
    practice_reps: 10

  - id: "stroke_hook_right"
    name: "Right Hook"
    domain: "writing"
    category: "fundamental"
    description: "Vertical down then hook right - basis for J, U, etc."
    prerequisites: ["stroke_vertical_down"]
    strokes: [[0,-50,0,-25], [0,-25,15,-10]]
    difficulty: 2
    practice_reps: 5

  # ============ LETTER COMPOSITIONS (Writing) ============
  - id: "letter_A"
    name: "Letter A"
    domain: "writing"
    category: "letter"
    description: "Two diagonals + crossbar"
    prerequisites: ["stroke_diagonal_down_left", "stroke_diagonal_down_right", "stroke_horizontal_right"]
    composition:
      - pattern: "stroke_diagonal_down_left"
        offset: [0, 0]
      - pattern: "stroke_diagonal_down_right"
        offset: [50, 0]
      - pattern: "stroke_horizontal_right"
        offset: [12, -25]
    difficulty: 3
    practice_reps: 5
    reading_link: "reading_letter_A"

  - id: "letter_B"
    name: "Letter B"
    domain: "writing"
    category: "letter"
    description: "Vertical + two clockwise curves"
    prerequisites: ["stroke_vertical_down", "stroke_curve_cw"]
    composition:
      - pattern: "stroke_vertical_down"
        offset: [0, 0]
      - pattern: "stroke_curve_cw"
        offset: [0, 0]
      - pattern: "stroke_curve_cw"
        offset: [0, -25]
    difficulty: 3
    practice_reps: 5
    reading_link: "reading_letter_B"

  - id: "letter_C"
    name: "Letter C"
    domain: "writing"
    category: "letter"
    description: "Single counter-clockwise curve"
    prerequisites: ["stroke_curve_ccw"]
    composition:
      - pattern: "stroke_curve_ccw"
        offset: [0, 0]
    difficulty: 2
    practice_reps: 5
    reading_link: "reading_letter_C"

  - id: "letter_D"
    name: "Letter D"
    domain: "writing"
    category: "letter"
    description: "Vertical + large clockwise curve"
    prerequisites: ["stroke_vertical_down", "stroke_curve_cw"]
    composition:
      - pattern: "stroke_vertical_down"
        offset: [0, 0]
      - pattern: "stroke_curve_cw"
        offset: [0, 0]
    difficulty: 2
    practice_reps: 5

  - id: "letter_E"
    name: "Letter E"
    domain: "writing"
    category: "letter"
    description: "Vertical + three horizontals"
    prerequisites: ["stroke_vertical_down", "stroke_horizontal_right"]
    composition:
      - pattern: "stroke_vertical_down"
        offset: [0, 0]
      - pattern: "stroke_horizontal_right"
        offset: [0, 0]
      - pattern: "stroke_horizontal_right"
        offset: [0, -25]
      - pattern: "stroke_horizontal_right"
        offset: [0, -50]
    difficulty: 2
    practice_reps: 5

  # ... (all 26 letters defined similarly)

  # ============ READING SKILLS ============
  - id: "reading_letter_recognition"
    name: "Letter Recognition"
    domain: "reading"
    category: "perception"
    description: "Recognize printed letters A-Z in multiple fonts"
    prerequisites: []
    model: "qwen3.6-27b"
    practice_reps: 20
    evaluation_metric: "accuracy"

  - id: "reading_letter_A"
    name: "Read Letter A"
    domain: "reading"
    category: "letter"
    description: "Recognize letter A in various contexts"
    prerequisites: ["reading_letter_recognition"]
    target_letter: "A"
    training_samples: 50
    evaluation_metric: "accuracy"

  - id: "reading_letter_B"
    name: "Read Letter B"
    domain: "reading"
    category: "letter"
    description: "Recognize letter B in various contexts"
    prerequisites: ["reading_letter_recognition"]
    target_letter: "B"
    training_samples: 50

  # ... (all 26 letters)

  - id: "reading_sight_words"
    name: "Sight Word Recognition"
    domain: "reading"
    category: "word"
    description: "Recognize high-frequency words without decoding"
    prerequisites: ["reading_letter_A", "reading_letter_B", "reading_letter_C", 
                    "reading_letter_D", "reading_letter_E", "reading_letter_F",
                    "reading_letter_G", "reading_letter_H", "reading_letter_I",
                    "reading_letter_J", "reading_letter_K", "reading_letter_L",
                    "reading_letter_M", "reading_letter_N", "reading_letter_O",
                    "reading_letter_P", "reading_letter_Q", "reading_letter_R",
                    "reading_letter_S", "reading_letter_T", "reading_letter_U",
                    "reading_letter_V", "reading_letter_W", "reading_letter_X",
                    "reading_letter_Y", "reading_letter_Z"]
    word_list: ["the", "and", "you", "that", "was", "for", "are", "with", "his", "they"]
    practice_reps: 10
    evaluation_metric: "accuracy"

  # ============ PAINTING SHAPES ============
  - id: "shape_circle"
    name: "Draw Circle"
    domain: "painting"
    category: "shape"
    description: "Continuous circular motion"
    prerequisites: []
    strokes: 8
    difficulty: 2
    practice_reps: 10

  - id: "shape_square"
    name: "Draw Square"
    domain: "painting"
    category: "shape"
    description: "Four straight lines, 90° corners"
    prerequisites: ["stroke_vertical_down", "stroke_horizontal_right"]
    strokes: 4
    difficulty: 1
    practice_reps: 10

  - id: "shape_triangle"
    name: "Draw Triangle"
    domain: "painting"
    category: "shape"
    description: "Three straight lines meeting at points"
    prerequisites: ["stroke_diagonal_down_left", "stroke_diagonal_down_right", "stroke_horizontal_right"]
    strokes: 3
    difficulty: 1
    practice_reps: 10

  - id: "shape_oval"
    name: "Draw Oval"
    domain: "painting"
    category: "shape"
    description: "Elongated circle"
    prerequisites: ["shape_circle"]
    strokes: 7
    difficulty: 2
    practice_reps: 5

  - id: "shape_star"
    name: "Draw 5-Point Star"
    domain: "painting"
    category: "shape"
    description: "Continuous star path"
    prerequisites: ["stroke_diagonal_down_left", "stroke_diagonal_down_right"]
    strokes: 10
    difficulty: 3
    practice_reps: 5

  # ============ PAINTING LANDSCAPE ELEMENTS ============
  - id: "painting_sky_gradient"
    name: "Paint Sky Gradient"
    domain: "painting"
    category: "landscape"
    description: "Blue to white horizontal bands"
    prerequisites: ["shape_square"]
    colors: ["dark_blue", "blue", "light_blue", "white"]
    technique: "horizontal_bands"
    practice_reps: 3

  - id: "painting_happy_cloud"
    name: "Paint Happy Cloud"
    domain: "painting"
    category: "landscape"
    description: "Fluffy white clouds with gray shadows"
    prerequisites: ["shape_circle", "painting_sky_gradient"]
    colors: ["white", "light_gray"]
    technique: "circular_dabs"
    practice_reps: 5

  - id: "painting_tree_trunk"
    name: "Paint Tree Trunk"
    domain: "painting"
    category: "landscape"
    description: "Vertical brown trunk with texture"
    prerequisites: ["stroke_vertical_down", "shape_rectangle"]
    colors: ["brown", "dark_green"]
    technique: "vertical_with_texture"
    practice_reps: 3

  - id: "painting_tree_foliage"
    name: "Paint Tree Foliage"
    domain: "painting"
    category: "landscape"
    description: "Green rounded foliage clusters"
    prerequisites: ["shape_circle", "painting_sky_gradient"]
    colors: ["green", "dark_green", "yellow"]
    technique: "circular_dabs_layered"
    practice_reps: 3

  - id: "painting_mountain"
    name: "Paint Mountain"
    domain: "painting"
    category: "landscape"
    description: "Triangular mountain with snow cap"
    prerequisites: ["shape_triangle", "painting_sky_gradient"]
    colors: ["dark_gray", "gray", "white"]
    technique: "triangle_with_highlight"
    practice_reps: 3

  - id: "painting_water"
    name: "Paint Water Reflection"
    domain: "painting"
    category: "landscape"
    description: "Horizontal mirror with ripples"
    prerequisites: ["painting_sky_gradient", "painting_mountain"]
    colors: ["blue", "light_blue", "white"]
    technique: "horizontal_ripples"
    practice_reps: 2

  # ============ COMPOSITE LANDSCAPES ============
  - id: "painting_full_landscape"
    name: "Complete Bob Ross Landscape"
    domain: "painting"
    category: "composition"
    description: "Sky, mountains, clouds, ground, trees, water"
    prerequisites: [
      "painting_sky_gradient",
      "painting_happy_cloud",
      "painting_mountain",
      "painting_tree_trunk",
      "painting_tree_foliage",
      "painting_water"
    ]
    practice_reps: 1
    evaluation_metric: "human_coherence_score"

  # ============ CROSS-DOMAIN TRANSFER ============
  - id: "transfer_stroke_to_shape"
    name: "Transfer Strokes to Shapes"
    domain: "transfer"
    category: "cross_domain"
    description: "Apply writing strokes to painting shapes"
    prerequisites: [
      "stroke_vertical_down", "stroke_horizontal_right",
      "stroke_diagonal_down_left", "stroke_diagonal_down_right",
      "stroke_curve_cw", "stroke_curve_ccw"
    ]
    enables: ["shape_square", "shape_triangle", "shape_circle", "shape_oval"]
    practice_reps: 5

  - id: "transfer_shape_to_letter"
    name: "Transfer Shapes to Letters"
    domain: "transfer"
    category: "cross_domain"
    description: "Use shape mastery for letter proportion"
    prerequisites: ["shape_circle", "shape_square", "shape_triangle", "shape_oval"]
    enables: ["letter_O", "letter_D", "letter_A", "letter_B"]
    practice_reps: 5

  - id: "transfer_reading_to_writing"
    name: "Reading Informs Writing"
    domain: "transfer"
    category: "cross_domain"
    description: "Letter recognition improves letter formation"
    prerequisites: ["reading_letter_recognition"]
    enables: ["letter_A", "letter_B", "letter_C", "letter_D", "letter_E"]
    practice_reps: 10

# DAG edges (prerequisites define the graph)
# Cyclic dependencies are prevented by the SkillDAG orchestrator

# ============ DRAWING FUNDAMENTALS (New - Geometric Foundation) ============
# Level 0: Line Control (Pure Motor Control)
  - id: "line_horizontal"
    name: "Horizontal Line Control"
    domain: "drawing"
    category: "line_control"
    description: "Straight horizontal line, left-to-right and right-to-left"
    prerequisites: []
    difficulty: 1
    practice_reps: 10
    evaluation:
      max_deviation_px: 3
      angle_tolerance_deg: 2
      length_tolerance_pct: 5

  - id: "line_vertical"
    name: "Vertical Line Control"
    domain: "drawing"
    category: "line_control"
    description: "Straight vertical line, top-to-bottom and bottom-to-top"
    prerequisites: []
    difficulty: 1
    practice_reps: 10
    evaluation:
      max_deviation_px: 3
      angle_tolerance_deg: 2
      length_tolerance_pct: 5

  - id: "line_diagonal_45"
    name: "Diagonal 45° Line"
    domain: "drawing"
    category: "line_control"
    description: "Diagonal line at 45° (↗)"
    prerequisites: []
    difficulty: 2
    practice_reps: 10
    evaluation:
      max_deviation_px: 4
      angle_tolerance_deg: 3
      length_tolerance_pct: 5

  - id: "line_diagonal_135"
    name: "Diagonal 135° Line"
    domain: "drawing"
    category: "line_control"
    description: "Diagonal line at 135° (↖)"
    prerequisites: []
    difficulty: 2
    practice_reps: 10
    evaluation:
      max_deviation_px: 4
      angle_tolerance_deg: 3
      length_tolerance_pct: 5

  - id: "line_diagonal_m45"
    name: "Diagonal -45° Line"
    domain: "drawing"
    category: "line_control"
    description: "Diagonal line at -45° (↘)"
    prerequisites: []
    difficulty: 2
    practice_reps: 10
    evaluation:
      max_deviation_px: 4
      angle_tolerance_deg: 3
      length_tolerance_pct: 5

  - id: "line_diagonal_m135"
    name: "Diagonal -135° Line"
    domain: "drawing"
    category: "line_control"
    description: "Diagonal line at -135° (↙)"
    prerequisites: []
    difficulty: 2
    practice_reps: 10
    evaluation:
      max_deviation_px: 4
      angle_tolerance_deg: 3
      length_tolerance_pct: 5

  - id: "pressure_fade_in"
    name: "Pressure Fade In"
    domain: "drawing"
    category: "pressure_control"
    description: "Line with pressure increasing from light to heavy"
    prerequisites: ["line_horizontal"]
    difficulty: 2
    practice_reps: 8
    evaluation:
      pressure_gradient: true

  - id: "pressure_fade_out"
    name: "Pressure Fade Out"
    domain: "drawing"
    category: "pressure_control"
    description: "Line with pressure decreasing from heavy to light"
    prerequisites: ["line_horizontal"]
    difficulty: 2
    practice_reps: 8
    evaluation:
      pressure_gradient: true

  - id: "pressure_wave"
    name: "Pressure Wave"
    domain: "drawing"
    category: "pressure_control"
    description: "Line with oscillating pressure (light-heavy-light)"
    prerequisites: ["pressure_fade_in", "pressure_fade_out"]
    difficulty: 3
    practice_reps: 6
    evaluation:
      pressure_oscillation: true

# Level 1: 2D Primitives
  - id: "prim_cross"
    name: "Cross (+)"
    domain: "drawing"
    category: "primitives_2d"
    description: "Vertical + horizontal line intersection"
    prerequisites: ["line_horizontal", "line_vertical"]
    difficulty: 1
    practice_reps: 5
    evaluation:
      angle_tolerance_deg: 3
      centering_tolerance_px: 5

  - id: "prim_square"
    name: "Square"
    domain: "drawing"
    category: "primitives_2d"
    description: "Four equal sides, 90° corners"
    prerequisites: ["line_horizontal", "line_vertical"]
    difficulty: 2
    practice_reps: 8
    evaluation:
      angle_tolerance_deg: 3
      length_tolerance_pct: 5
      closure_tolerance_px: 5

  - id: "prim_rectangle"
    name: "Rectangle"
    domain: "drawing"
    category: "primitives_2d"
    description: "Four sides, opposite equal, 90° corners"
    prerequisites: ["prim_square"]
    difficulty: 2
    practice_reps: 6
    evaluation:
      angle_tolerance_deg: 3
      length_tolerance_pct: 5
      closure_tolerance_px: 5

  - id: "prim_x_mark"
    name: "X Mark (×)"
    domain: "drawing"
    category: "primitives_2d"
    description: "Two diagonals crossing at center"
    prerequisites: ["line_diagonal_45", "line_diagonal_135"]
    difficulty: 2
    practice_reps: 6
    evaluation:
      angle_tolerance_deg: 3
      centering_tolerance_px: 5

  - id: "prim_diamond"
    name: "Diamond (Rotated Square)"
    domain: "drawing"
    category: "primitives_2d"
    description: "Square rotated 45°"
    prerequisites: ["prim_x_mark"]
    difficulty: 3
    practice_reps: 6
    evaluation:
      angle_tolerance_deg: 3
      length_tolerance_pct: 5
      closure_tolerance_px: 5

  - id: "prim_equilateral_triangle"
    name: "Equilateral Triangle"
    domain: "drawing"
    category: "primitives_2d"
    description: "Three equal sides, 60° angles"
    prerequisites: ["line_diagonal_45"]
    difficulty: 2
    practice_reps: 8
    evaluation:
      angle_tolerance_deg: 3
      length_tolerance_pct: 5
      closure_tolerance_px: 5

  - id: "prim_right_triangle"
    name: "Right Triangle"
    domain: "drawing"
    category: "primitives_2d"
    description: "One 90° angle, two acute angles"
    prerequisites: ["line_horizontal", "line_vertical", "line_diagonal_45"]
    difficulty: 2
    practice_reps: 6
    evaluation:
      angle_tolerance_deg: 3
      closure_tolerance_px: 5

  - id: "prim_hexagon"
    name: "Regular Hexagon"
    domain: "drawing"
    category: "primitives_2d"
    description: "Six equal sides, 120° angles"
    prerequisites: ["prim_equilateral_triangle"]
    difficulty: 3
    practice_reps: 5
    evaluation:
      angle_tolerance_deg: 4
      length_tolerance_pct: 6
      closure_tolerance_px: 6

  - id: "prim_octagon"
    name: "Regular Octagon"
    domain: "drawing"
    category: "primitives_2d"
    description: "Eight equal sides, 135° angles"
    prerequisites: ["prim_square", "prim_diamond"]
    difficulty: 3
    practice_reps: 5
    evaluation:
      angle_tolerance_deg: 4
      length_tolerance_pct: 6
      closure_tolerance_px: 6

  - id: "prim_circle"
    name: "Circle"
    domain: "drawing"
    category: "primitives_2d"
    description: "Continuous curved closed form"
    prerequisites: ["pressure_wave"]
    difficulty: 3
    practice_reps: 8
    evaluation:
      circularity_threshold: 0.85
      closure_tolerance_px: 8

# Level 2: 3D Wireframes
  - id: "wire_cube_iso"
    name: "Cube (Isometric)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "12-edge cube in isometric projection"
    prerequisites: ["prim_square", "line_diagonal_45"]
    difficulty: 2
    practice_reps: 5
    evaluation:
      perspective_type: "isometric"
      edge_angle_tolerance_deg: 4
      vertex_closure_px: 5

  - id: "wire_box_iso"
    name: "Rectangular Box (Isometric)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Box with different W/D/H in isometric"
    prerequisites: ["wire_cube_iso", "prim_rectangle"]
    difficulty: 3
    practice_reps: 4
    evaluation:
      perspective_type: "isometric"
      proportion_tolerance_pct: 10

  - id: "wire_cube_1pt"
    name: "Cube (1-Point Perspective)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Cube with depth converging to single VP"
    prerequisites: ["wire_cube_iso", "perspective_1pt"]
    difficulty: 3
    practice_reps: 5
    evaluation:
      perspective_type: "1pt"
      vp_convergence_tolerance_px: 8

  - id: "wire_cube_2pt"
    name: "Cube (2-Point Perspective)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Cube with two vanishing points on horizon"
    prerequisites: ["wire_cube_1pt", "perspective_2pt"]
    difficulty: 3
    practice_reps: 5
    evaluation:
      perspective_type: "2pt"
      vp_convergence_tolerance_px: 8
      vertex_closure_px: 6

  - id: "wire_box_2pt"
    name: "Box (2-Point Perspective)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Rectangular box in 2-point perspective"
    prerequisites: ["wire_cube_2pt", "wire_box_iso"]
    difficulty: 4
    practice_reps: 4
    evaluation:
      perspective_type: "2pt"
      proportion_tolerance_pct: 10

  - id: "wire_pyramid_2pt"
    name: "Square Pyramid (2-Point)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Pyramid on square base in 2pt perspective"
    prerequisites: ["wire_cube_2pt", "prim_equilateral_triangle"]
    difficulty: 4
    practice_reps: 4
    evaluation:
      perspective_type: "2pt"
      apex_centering_tolerance_px: 6

  - id: "wire_prism_2pt"
    name: "Triangular Prism (2-Point)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Prism with triangle base in 2pt perspective"
    prerequisites: ["wire_cube_2pt", "prim_equilateral_triangle"]
    difficulty: 4
    practice_reps: 4
    evaluation:
      perspective_type: "2pt"

  - id: "wire_cylinder_2pt"
    name: "Cylinder (2-Point Wireframe)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Two ellipses + vertical edges in 2pt perspective"
    prerequisites: ["wire_cube_2pt", "prim_circle", "perspective_ellipse"]
    difficulty: 4
    practice_reps: 4
    evaluation:
      perspective_type: "2pt"
      ellipse_accuracy_threshold: 0.8

  - id: "wire_cone_2pt"
    name: "Cone (2-Point Wireframe)"
    domain: "drawing"
    category: "wireframe_3d"
    description: "Ellipse base + apex in 2pt perspective"
    prerequisites: ["wire_cube_2pt", "prim_equilateral_triangle"]
    difficulty: 4
    practice_reps: 3
    evaluation:
      perspective_type: "2pt"

# Level 3: Perspective Construction
  - id: "perspective_1pt"
    name: "1-Point Perspective Setup"
    domain: "drawing"
    category: "perspective"
    description: "Horizon line + single vanishing point"
    prerequisites: ["wire_cube_iso"]
    difficulty: 2
    practice_reps: 3
    evaluation:
      vp_placement_accuracy_px: 5

  - id: "perspective_2pt"
    name: "2-Point Perspective Setup"
    domain: "drawing"
    category: "perspective"
    description: "Horizon line + two vanishing points"
    prerequisites: ["perspective_1pt"]
    difficulty: 3
    practice_reps: 3
    evaluation:
      vp_placement_accuracy_px: 5
      horizon_straightness_px: 3

  - id: "perspective_3pt"
    name: "3-Point Perspective Setup"
    domain: "drawing"
    category: "perspective"
    description: "Horizon + 2 VPs + zenith/nadir"
    prerequisites: ["perspective_2pt"]
    difficulty: 4
    practice_reps: 2
    evaluation:
      vp_placement_accuracy_px: 8

  - id: "perspective_ellipse"
    name: "Ellipse in Perspective"
    domain: "drawing"
    category: "perspective"
